name: Deploy Firebase Functions

on:
  push:
    branches: [main]
    paths:
      - "functions/**"
      - "firebase.json"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Write functions .env file
        run: echo "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}" > functions/.env

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only functions --project production --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
